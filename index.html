<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Infinity | Rakib Hasan (Sir)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="animated-bg dark:text-slate-100 text-slate-800 font-sans min-h-screen pb-12">

    <div class="max-w-6xl mx-auto px-4 py-6 relative z-10">
        
        <header class="bg-white/90 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700 rounded-3xl p-6 shadow-xl mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <div class="bg-gradient-to-r from-cyan-500 to-blue-500 p-2 rounded-xl text-white">
                            <i class="fa-solid fa-atom text-xl animate-spin [animation-duration:15s]"></i>
                        </div>
                        <h1 class="font-display text-2xl md:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent">
                            Physics Infinity
                        </h1>
                    </div>
                    <p class="text-sm font-semibold text-slate-600 dark:text-slate-300">
                        <i class="fa-solid fa-graduation-cap text-cyan-500"></i> Mentor: Rakib Hasan (Sir)
                    </p>
                    <div class="flex flex-wrap gap-3 mt-3 text-xs text-slate-500 dark:text-slate-400">
                        <span class="bg-slate-100 dark:bg-slate-700 px-3 py-1 rounded-full"><i class="fa-solid fa-phone text-emerald-500"></i> 01521414727</span>
                        <span class="bg-slate-100 dark:bg-slate-700 px-3 py-1 rounded-full"><i class="fa-solid fa-envelope text-purple-400"></i> rakib.cuet27@gmail.com</span>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="toggleAdminPanel(true)" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider px-4 py-2.5 rounded-xl transition-all shadow-md">
                        <i class="fa-solid fa-user-shield"></i> Teacher Panel
                    </button>
                    <button onclick="toggleTheme()" class="bg-slate-100 dark:bg-slate-700 p-2.5 rounded-xl text-slate-600 dark:text-slate-300">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <section class="mb-8 bg-slate-100/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl max-w-2xl mx-auto shadow-md">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-hsc" onclick="updateSelection('version', 'HSC')" class="py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-cyan-500 to-blue-500 text-white">HSC Version</button>
                    <button id="btn-ssc" onclick="updateSelection('version', 'SSC')" class="py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">SSC Version</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-bangla" onclick="updateSelection('medium', 'Bangla')" class="py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-purple-500 to-indigo-500 text-white">Bangla Medium</button>
                    <button id="btn-english" onclick="updateSelection('medium', 'English')" class="py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">English Medium</button>
                </div>
            </div>
            <p class="text-center text-xs text-slate-400 mt-3 font-medium">
                Active Catalog: <span id="current-badge" class="text-cyan-400 font-bold">HSC - Bangla Medium</span>
            </p>
        </section>

        <main class="mb-12 block clear-both opacity-100 min-h-[400px]">
            <div id="books-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>

        <section id="admin-panel" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl w-full max-w-md p-6 relative">
                <div class="flex justify-between items-center mb-4 border-b dark:border-slate-800 pb-2">
                    <h3 class="text-lg font-bold dark:text-white text-slate-900"><i class="fa-solid fa-server text-cyan-500 mr-2"></i>Upload Center</h3>
                    <button onclick="toggleAdminPanel(false)" class="text-slate-400 hover:text-slate-600 dark:hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <form id="upload-form" onsubmit="commitUpload(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Class</label>
                            <select id="upload-version" class="w-full bg-slate-100 dark:bg-slate-800 p-2 rounded-lg text-xs dark:text-white">
                                <option value="HSC">HSC Version</option>
                                <option value="SSC">SSC Version</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Medium</label>
                            <select id="upload-medium" class="w-full bg-slate-100 dark:bg-slate-800 p-2 rounded-lg text-xs dark:text-white">
                                <option value="Bangla">Bangla Medium</option>
                                <option value="English">English Medium</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Book Category</label>
                        <select id="upload-category" class="w-full bg-slate-100 dark:bg-slate-800 p-2.5 rounded-lg text-xs dark:text-white">
                            <option value="basic">Basic Book</option>
                            <option value="concept">Concept Book</option>
                            <option value="shortmath">Short Math (MCQ) Book</option>
                            <option value="mcqbooster">MCQ Booster</option>
                            <option value="cqbooster">CQ Booster</option>
                            <option value="suggestions">Mega / Suggestions</option>
                            <option value="foundation">Foundation Book</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Select PDF File</label>
                        <input type="file" id="upload-file" accept=".pdf" required class="w-full text-xs text-slate-500 dark:text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-cyan-500 file:text-white hover:file:bg-cyan-600">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold text-xs py-3 rounded-lg uppercase tracking-wider">Push to App Grid</button>
                </form>
            </div>
        </section>

        <footer class="text-center text-[11px] text-slate-500 border-t dark:border-slate-800/80 pt-4 mt-6">
            <p>&copy; 2026 Physics Infinity | Rakib Hasan (Sir)</p>
        </footer>
    </div>

    <script>
        const categories = [
            { id: 'basic', name: 'Basic Book', icon: 'fa-book-open-reader', color: 'from-cyan-500 to-blue-600' },
            { id: 'concept', name: 'Concept Book', icon: 'fa-brain', color: 'from-blue-500 to-indigo-600' },
            { id: 'shortmath', name: 'Short Math (MCQ) Book', icon: 'fa-calculator', color: 'from-purple-500 to-pink-600' },
            { id: 'mcqbooster', name: 'MCQ Booster', icon: 'fa-rocket', color: 'from-amber-500 to-orange-600' },
            { id: 'cqbooster', name: 'CQ Booster', icon: 'fa-shield-cat', color: 'from-emerald-500 to-teal-600' },
            { id: 'suggestions', name: 'Mega / Suggestions', icon: 'fa-fire-flame-curved', color: 'from-rose-500 to-red-600' },
            { id: 'foundation', name: 'Foundation Book', icon: 'fa-building-columns', color: 'from-indigo-500 to-purple-600' }
        ];

        let state = { version: 'HSC', medium: 'Bangla' };
        let db = {};

        // Run immediately when script loads to bypass rendering blocks
        function initApp() {
            const raw = localStorage.getItem('physics_infinity_db');
            if (raw) { try { db = JSON.parse(raw); } catch(e) { db = {}; } }
            
            // Check Theme
            if (localStorage.getItem('theme-matrix') === 'light') {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('animated-bg');
                document.body.classList.add('bg-slate-50');
                document.getElementById('theme-icon').className = "fa-solid fa-sun text-amber-500";
            }
            renderGrid();
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                document.body.classList.add('animated-bg');
                document.body.classList.remove('bg-slate-50');
                icon.className = "fa-solid fa-moon";
                localStorage.setItem('theme-matrix', 'dark');
            } else {
                document.body.classList.remove('animated-bg');
                document.body.classList.add('bg-slate-50');
                icon.className = "fa-solid fa-sun text-amber-500";
                localStorage.setItem('theme-matrix', 'light');
            }
        }

        function updateSelection(type, val) {
            state[type] = val;
            
            // Update button styles directly
            if(type === 'version') {
                document.getElementById('btn-hsc').className = val === 'HSC' ? "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-cyan-500 to-blue-500 text-white" : "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300";
                document.getElementById('btn-ssc').className = val === 'SSC' ? "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-cyan-500 to-blue-500 text-white" : "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300";
            } else {
                document.getElementById('btn-bangla').className = val === 'Bangla' ? "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-purple-500 to-indigo-500 text-white" : "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300";
                document.getElementById('btn-english').className = val === 'English' ? "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-gradient-to-r from-purple-500 to-indigo-500 text-white" : "py-2 px-3 font-bold text-xs rounded-lg transition-all bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300";
            }
            renderGrid();
        }

        function renderGrid() {
            document.getElementById('current-badge').innerText = ${state.version} - ${state.medium} Medium;
            const grid = document.getElementById('books-grid');
            grid.innerHTML = ''; 

            categories.forEach(item => {
                const key = ${state.version}_${state.medium}_${item.id};
                const file = db[key];

                const card = document.createElement('div');
                card.className = "bg-white dark:bg-slate-800/90 border border-slate-200 dark:border-slate-700/60 p-5 rounded-2xl flex flex-col justify-between shadow transition-all hover:scale-[1.02]";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <div class="p-2.5 rounded-xl bg-gradient-to-br ${item.color} text-white">
                                <i class="fa-solid ${item.icon} text-lg"></i>
                            </div>
                            <span class="text-[10px] uppercase font-bold px-2.5 py-0.5 rounded-full ${file ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-500/20 text-slate-400'}">
                                ${file ? 'Available' : 'Empty'}
                            </span>
                        </div>
                        <h3 class="font-display font-bold text-base dark:text-white text-slate-900">${item.name}</h3>
                        ${file ? `
                            <p class="text-[11px] font-mono mt-2 text-cyan-400 truncate bg-slate-100 dark:bg-slate-900 p-1.5 rounded"><i class="fa-solid fa-paperclip"></i> ${file.name}</p>
                        ` : '<p class="text-xs text-slate-400 mt-1">Syllabus-focused academic resource.</p>'}
                    </div>
                    ${file ? `
                        <a href="${file.data}" download="${file.name}" class="w-full mt-4 flex items-center justify-center gap-2 text-xs font-bold text-white bg-gradient-to-r ${item.color} py-2.5 rounded-lg shadow-md">
                            <i class="fa-solid fa-file-arrow-down"></i> View / Download PDF
                        </a>
                    ` : `
                        <button disabled class="w-full mt-4 flex items-center justify-center gap-2 text-xs font-bold text-slate-400 bg-slate-100 dark:bg-slate-900/50 py-2.5 rounded-lg border dark:border-slate-800 cursor-not-allowed">
                            <i class="fa-solid fa-lock text-[10px]"></i> Locked
                        </button>
                    `}
                `;
                grid.appendChild(card);
            });
        }

        function toggleAdminPanel(show) {
            document.getElementById('admin-panel').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('upload-version').value = state.version;
                document.getElementById('upload-medium').value = state.medium;
            }
        }

        function commitUpload(e) {
            e.preventDefault();
            const v = document.getElementById('upload-version').value;
            const m = document.getElementById('upload-medium').value;
            const c = document.getElementById('upload-category').value;
            const fileInput = document.getElementById('upload-file');

            if (!fileInput.files.length) return;
            const file = fileInput.files[0];

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    db[${v}_${m}_${c}] = { name: file.name, data: evt.target.result };
                    localStorage.setItem('physics_infinity_db', JSON.stringify(db));
                    renderGrid();
                    toggleAdminPanel(false);
                    document.getElementById('upload-form').reset();
                } catch(err) {
                    alert("File too large! Please try an optimized PDF file under 4MB.");
                }
            };
            reader.readAsDataURL(file);
        }

        // Run initialization
        initApp();
    </script>
</body>
</html>
